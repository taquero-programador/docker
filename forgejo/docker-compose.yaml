services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:15
    container_name: forgejo
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - FORGEJO__database__DB_TYPE=postgres
      - FORGEJO__database__HOST=host.docker.internal:5432
      - FORGEJO__database__NAME=${FORGEJO__database__NAME}
      - FORGEJO__database__USER=${FORGEJO__database__USER}
      - FORGEJO__database__PASSWD=${FORGEJO__database__PASSWD}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 3000:3000 # host:docker
      - 222:22
    restart: always
    networks:
      - forgejo

    healthcheck:
      test: curl -f http://localhost:3000
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  forgejo:
    external: true
    name: my_network
