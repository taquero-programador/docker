services:
  navidrome:
    container_name: navidrome
    image: deluan/navidrome:latest
    environment:
      - PUID=${PUID}
      - PGUI=${PGUI}
      #- TZ=${TZ}
      - ND_LOGLEVEL=${ND_LOGLEVEL}
      - ND_PORT=${ND_PORT}
      - ND_LYRICSPRIORITY=${ND_LYRICSPRIORITY}
      - ND_LASTFM_ENABLED=${ND_LASTFM_ENABLED}
      - ND_LASTFM_APIKEY=${ND_LASTFM_APIKEY}
      - ND_LASTFM_SECRET=${ND_LASTFM_SECRET}
      - ND_UILOGINBACKGROUNDURL=abcd
      - ND_SCANINTERVAL=1h
      - ND_LOGLEVEL=info
    volumes:
      - ./data:/data
      - ${PATH_MUSIC}:/music:ro
      - /etc/localtime:/etc/localtime
    ports:
      - 4533:4533
    restart: unless-stopped
    networks:
      - navidrome

networks:
  navidrome:
    external: true
    name: my_network
